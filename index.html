<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC Irunés · Gestión de Socios</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --surface2: #f0f0f0;
    --border: #e0e0e0;
    --accent: #1a3a5c;
    --accent2: #2e6da4;
    --text: #1a1a1a;
    --muted: #888;
    --danger: #c0392b;
    --success: #27ae60;
    --warning: #e67e22;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; flex-direction: column; gap: 2rem;
  }
  .login-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 3rem; width: 360px;
    display: flex; flex-direction: column; gap: 1.5rem;
  }
  .login-logo { text-align: center; }
  .login-logo span { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; }
  .login-logo h1 { font-size: 1.4rem; font-weight: 600; color: var(--accent); margin-top: 0.5rem; }
  .login-label { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; }
  .login-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 0.9rem 1rem; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 1.1rem; letter-spacing: 0.2em;
    outline: none; transition: border-color 0.2s;
  }
  .login-input:focus { border-color: var(--accent); }
  .login-btn {
    width: 100%; background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius); padding: 0.9rem; font-family: 'DM Sans', sans-serif;
    font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: opacity 0.2s;
  }
  .login-btn:hover { opacity: 0.85; }
  .login-error { color: var(--danger); font-size: 0.85rem; text-align: center; display: none; }

  /* APP */
  #app { display: none; }
  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 1rem; }
  .header-logo { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.15em; }
  .header-title { font-size: 1rem; font-weight: 600; color: var(--accent); }
  .header-stats { display: flex; gap: 1.5rem; }
  .stat { text-align: center; }
  .stat-num { font-family: 'DM Mono', monospace; font-size: 1.1rem; font-weight: 500; color: var(--accent); }
  .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .logout-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: var(--radius); padding: 0.4rem 1rem; cursor: pointer;
    font-size: 0.8rem; transition: all 0.2s;
  }
  .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

  .main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

  /* TOOLBAR */
  .toolbar { display: flex; gap: 1rem; margin-bottom: 1.5rem; align-items: center; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 250px; position: relative; }
  .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.9rem; }
  .search-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 0.7rem 1rem 0.7rem 2.5rem;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    outline: none; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .filter-select {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    border-radius: var(--radius); padding: 0.7rem 1rem; font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem; outline: none; cursor: pointer;
  }
  .btn-add {
    background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
    padding: 0.7rem 1.5rem; font-weight: 600; font-size: 0.85rem; cursor: pointer;
    white-space: nowrap; transition: opacity 0.2s;
  }
  .btn-add:hover { opacity: 0.85; }

  /* TABLE */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface2); }
  th {
    padding: 0.8rem 1rem; text-align: left; font-family: 'DM Mono', monospace;
    font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 500; border-bottom: 1px solid var(--border);
  }
  td { padding: 0.85rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.88rem; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); cursor: pointer; }
  .num { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--muted); }
  .badge {
    display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px;
    font-size: 0.72rem; font-weight: 500; letter-spacing: 0.05em;
  }
  .badge-normal { background: #e8f8ef; color: #1e8449; border: 1px solid #a9dfbf; }
  .badge-honorario { background: #fef9e7; color: #b7770d; border: 1px solid #f9e79f; }
  .badge-pagado { background: #e8f8ef; color: #1e8449; border: 1px solid #a9dfbf; }
  .badge-pendiente { background: #fdecea; color: #c0392b; border: 1px solid #f1948a; }
  .badge-exento { background: #eaf4fb; color: #1a6fa0; border: 1px solid #85c1e9; }
  .llave { color: var(--accent); font-size: 1rem; }
  .no-llave { color: var(--border); font-size: 1rem; }
  .empty-row td { text-align: center; color: var(--muted); padding: 3rem; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    z-index: 100; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    width: 640px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
    padding: 2rem;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
  .modal-title { font-size: 1.1rem; font-weight: 600; }
  .modal-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.4rem; line-height: 1; }
  .modal-close:hover { color: var(--text); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; font-family: 'DM Mono', monospace; }
  .form-input, .form-select {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 0.7rem 0.9rem; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; outline: none; transition: border-color 0.2s; width: 100%;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-check { display: flex; align-items: center; gap: 0.6rem; margin-top: 0.3rem; }
  .form-check input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
  .form-check label { font-size: 0.9rem; cursor: pointer; }
  .modal-footer { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
  .btn-cancel {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: var(--radius); padding: 0.7rem 1.5rem; cursor: pointer; font-size: 0.9rem;
    transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: var(--text); color: var(--text); }
  .btn-save {
    background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
    padding: 0.7rem 1.5rem; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-delete {
    background: none; border: 1px solid var(--danger); color: var(--danger);
    border-radius: var(--radius); padding: 0.7rem 1.5rem; cursor: pointer; font-size: 0.9rem;
    transition: all 0.2s; margin-right: auto;
  }
  .btn-delete:hover { background: var(--danger); color: #fff; }

  .toast {
    position: fixed; bottom: 2rem; right: 2rem; background: var(--surface2);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.5rem;
    font-size: 0.9rem; z-index: 200; transform: translateY(100px); opacity: 0;
    transition: all 0.3s; pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  .section-sep { margin: 0 0 1rem 0; font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); grid-column: 1/-1; }

  @media (max-width: 768px) {
    .form-grid { grid-template-columns: 1fr; }
    .header-stats { display: none; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <span>Club Ciclista Irunés</span>
      <h1>Gestión de Socios</h1>
    </div>
    <div>
      <div class="login-label">Código de acceso</div>
      <input type="password" class="login-input" id="login-input" placeholder="••••••" maxlength="10" />
    </div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error">Código incorrecto</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-left">
      <div>
        <div class="header-logo">CC Irunés</div>
        <div class="header-title">Gestión de Socios</div>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total</div></div>
      <div class="stat"><div class="stat-num" id="stat-pagados">—</div><div class="stat-label">Al día</div></div>
      <div class="stat"><div class="stat-num" id="stat-pendientes">—</div><div class="stat-label">Pendientes</div></div>
      <div class="stat"><div class="stat-num" id="stat-honorarios">—</div><div class="stat-label">Honorarios</div></div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Salir</button>
  </div>

  <div class="main">
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" class="search-input" id="search" placeholder="Buscar por nombre, nº socio, DNI..." oninput="renderTable()" />
      </div>
      <select class="filter-select" id="filter-tipo" onchange="renderTable()">
        <option value="">Todos los tipos</option>
        <option value="normal">Normal</option>
        <option value="honorario">Honorario</option>
      </select>
      <select class="filter-select" id="filter-cuota" onchange="renderTable()">
        <option value="">Todas las cuotas</option>
        <option value="true">Pagada</option>
        <option value="false">Pendiente</option>
      </select>
      <button class="btn-add" onclick="openModal(null)">+ Nuevo socio</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Nº</th>
            <th>Nombre</th>
            <th>Teléfono</th>
            <th>Email</th>
            <th>Tipo</th>
            <th>Cuota</th>
            <th>Llave</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Nuevo socio</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-grid">
      <div class="section-sep">Datos personales</div>
      <div class="form-group">
        <label class="form-label">Nº Socio</label>
        <input type="text" class="form-input" id="f-num" placeholder="001" />
      </div>
      <div class="form-group">
        <label class="form-label">DNI</label>
        <input type="text" class="form-input" id="f-dni" placeholder="12345678A" />
      </div>
      <div class="form-group">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-input" id="f-nombre" placeholder="Juan" />
      </div>
      <div class="form-group">
        <label class="form-label">Apellidos</label>
        <input type="text" class="form-input" id="f-apellidos" placeholder="García López" />
      </div>
      <div class="form-group">
        <label class="form-label">Teléfono</label>
        <input type="text" class="form-input" id="f-tel" placeholder="600000000" />
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="f-email" placeholder="correo@ejemplo.com" />
      </div>
      <div class="form-group full">
        <label class="form-label">Dirección</label>
        <input type="text" class="form-input" id="f-direccion" placeholder="Calle Mayor, 1 - 2ºA" />
      </div>
      <div class="form-group">
        <label class="form-label">Localidad</label>
        <input type="text" class="form-input" id="f-localidad" placeholder="Irún" />
      </div>
      <div class="form-group">
        <label class="form-label">Código Postal</label>
        <input type="text" class="form-input" id="f-cp" placeholder="20300" />
      </div>
      <div class="form-group full">
        <label class="form-label">Nº Cuenta (IBAN)</label>
        <input type="text" class="form-input" id="f-cuenta" placeholder="ES00 0000 0000 0000 0000 0000" />
      </div>

      <div class="section-sep">Estado</div>
      <div class="form-group">
        <label class="form-label">Tipo de socio</label>
        <select class="form-select" id="f-tipo" onchange="onTipoChange()">
          <option value="normal">Normal</option>
          <option value="honorario">Honorario</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Fecha de alta</label>
        <input type="date" class="form-input" id="f-fecha" />
      </div>
      <div class="form-group" id="cuota-group">
        <label class="form-label">Cuota</label>
        <select class="form-select" id="f-cuota">
          <option value="true">Pagada</option>
          <option value="false">Pendiente</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Opciones</label>
        <div class="form-check">
          <input type="checkbox" id="f-llave" />
          <label for="f-llave">Llave asignada</label>
        </div>
        <div class="form-check" style="margin-top:0.5rem">
          <input type="checkbox" id="f-activo" checked />
          <label for="f-activo">Socio activo</label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-delete" id="btn-delete" onclick="deleteSocio()" style="display:none">Eliminar</button>
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveSocio()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // CONFIG — cambia esto por tu URL y anon key de Supabase
  const SUPABASE_URL = 'https://dbydtwkzknbpifneznsu.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRieWR0d2t6a25icGlmbmV6bnN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjMwODIsImV4cCI6MjA5MDc5OTA4Mn0.HcTWBEaI-2EH66mAUAaEM2ppzDG3eCd1ANjopNZdt1g';
  const ADMIN_CODE   = '2121$';

  let socios = [];
  let editingId = null;

  // AUTH
  function doLogin() {
    const val = document.getElementById('login-input').value;
    if (val === ADMIN_CODE) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadSocios();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }
  document.getElementById('login-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  function doLogout() {
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-input').value = '';
  }

  // SUPABASE FETCH
  async function sbFetch(method, path, body) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      method,
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': method === 'POST' ? 'return=representation' : 'return=representation'
      },
      body: body ? JSON.stringify(body) : undefined
    });
    if (!res.ok) throw new Error(await res.text());
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  async function loadSocios() {
    try {
      socios = await sbFetch('GET', 'socios?select=*&order=socio_num.asc&activo=eq.true');
      updateStats();
      renderTable();
    } catch(e) {
      showToast('Error cargando socios: ' + e.message, 'error');
    }
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = socios.length;
    document.getElementById('stat-pagados').textContent = socios.filter(s => s.cuota_pagada === true).length;
    document.getElementById('stat-pendientes').textContent = socios.filter(s => s.cuota_pagada === false).length;
    document.getElementById('stat-honorarios').textContent = socios.filter(s => s.tipo_socio === 'honorario').length;
  }

  function renderTable() {
    const q = document.getElementById('search').value.toLowerCase();
    const tipo = document.getElementById('filter-tipo').value;
    const cuota = document.getElementById('filter-cuota').value;

    let filtered = socios.filter(s => {
      const match = !q || 
        (s.nombre || '').toLowerCase().includes(q) ||
        (s.apellidos || '').toLowerCase().includes(q) ||
        (s.socio_num || '').toLowerCase().includes(q) ||
        (s.dni || '').toLowerCase().includes(q) ||
        (s.email || '').toLowerCase().includes(q);
      const matchTipo = !tipo || s.tipo_socio === tipo;
      const matchCuota = !cuota || String(s.cuota_pagada) === cuota;
      return match && matchTipo && matchCuota;
    });

    const tbody = document.getElementById('table-body');
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="7">Sin resultados</td></tr>';
      return;
    }

    tbody.innerHTML = filtered.map(s => {
      const cuotaBadge = s.tipo_socio === 'honorario'
        ? '<span class="badge badge-exento">Exento</span>'
        : s.cuota_pagada === true
          ? '<span class="badge badge-pagado">Pagada</span>'
          : '<span class="badge badge-pendiente">Pendiente</span>';
      const tipoBadge = s.tipo_socio === 'honorario'
        ? '<span class="badge badge-honorario">Honorario</span>'
        : '<span class="badge badge-normal">Normal</span>';
      const llave = s.llave_asignada ? '<span class="llave" title="Tiene llave">🔑</span>' : '<span class="no-llave">—</span>';
      const idx = socios.indexOf(s);
      return `<tr onclick="openModal(${idx})">
        <td class="num">${s.socio_num || '—'}</td>
        <td><strong>${s.apellidos || ''}</strong>${s.apellidos && s.nombre ? ', ' : ''}${s.nombre || ''}</td>
        <td>${s.tel || '—'}</td>
        <td style="color:var(--muted);font-size:0.82rem">${s.email || '—'}</td>
        <td>${tipoBadge}</td>
        <td>${cuotaBadge}</td>
        <td>${llave}</td>
      </tr>`;
    }).join('');
  }

  // MODAL
  function openModal(idx) {
    const s = (idx !== undefined && idx !== null && idx !== '') ? socios[idx] : null;
    editingId = s ? s.socio_num : null;
    document.getElementById('modal-title').textContent = s ? `Editar socio · ${s.socio_num}` : 'Nuevo socio';
    document.getElementById('btn-delete').style.display = s ? 'block' : 'none';

    document.getElementById('f-num').value = s?.socio_num || '';
    document.getElementById('f-dni').value = s?.dni || '';
    document.getElementById('f-nombre').value = s?.nombre || '';
    document.getElementById('f-apellidos').value = s?.apellidos || '';
    document.getElementById('f-tel').value = s?.tel || '';
    document.getElementById('f-email').value = s?.email || '';
    document.getElementById('f-direccion').value = s?.direccion || '';
    document.getElementById('f-localidad').value = s?.localidad || '';
    document.getElementById('f-cp').value = s?.codigo_postal || '';
    document.getElementById('f-cuenta').value = s?.numero_cuenta || '';
    document.getElementById('f-tipo').value = s?.tipo_socio || 'normal';
    document.getElementById('f-fecha').value = s?.fecha_alta || '';
    document.getElementById('f-cuota').value = s?.cuota_pagada != null ? String(s.cuota_pagada) : 'false';
    document.getElementById('f-llave').checked = s?.llave_asignada || false;
    document.getElementById('f-activo').checked = s?.activo !== false;
    onTipoChange();

    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    editingId = null;
  }

  function onTipoChange() {
    const tipo = document.getElementById('f-tipo').value;
    document.getElementById('cuota-group').style.opacity = tipo === 'honorario' ? '0.3' : '1';
    document.getElementById('f-cuota').disabled = tipo === 'honorario';
  }

  async function saveSocio() {
    const tipo = document.getElementById('f-tipo').value;
    const data = {
      socio_num: document.getElementById('f-num').value.trim(),
      dni: document.getElementById('f-dni').value.trim() || null,
      nombre: document.getElementById('f-nombre').value.trim() || null,
      apellidos: document.getElementById('f-apellidos').value.trim() || null,
      tel: document.getElementById('f-tel').value.trim() || null,
      email: document.getElementById('f-email').value.trim() || null,
      direccion: document.getElementById('f-direccion').value.trim() || null,
      localidad: document.getElementById('f-localidad').value.trim() || null,
      codigo_postal: document.getElementById('f-cp').value.trim() || null,
      numero_cuenta: document.getElementById('f-cuenta').value.trim() || null,
      tipo_socio: tipo,
      fecha_alta: document.getElementById('f-fecha').value || null,
      cuota_pagada: tipo === 'honorario' ? null : document.getElementById('f-cuota').value === 'true',
      llave_asignada: document.getElementById('f-llave').checked,
      activo: document.getElementById('f-activo').checked,
    };

    try {
      if (editingId) {
        delete data.socio_num; // no actualizar la PK
        await sbFetch('PATCH', `socios?socio_num=eq.${encodeURIComponent(editingId)}`, data);
        showToast('Socio actualizado', 'success');
      } else {
        await sbFetch('POST', 'socios', data);
        showToast('Socio creado', 'success');
      }
      closeModal();
      await loadSocios();
    } catch(e) {
      showToast('Error: ' + e.message, 'error');
    }
  }

  async function deleteSocio() {
    if (!editingId) return;
    if (!confirm('¿Seguro que quieres eliminar este socio?')) return;
    try {
      await sbFetch('DELETE', `socios?socio_num=eq.${encodeURIComponent(editingId)}`);
      showToast('Socio eliminado', 'success');
      closeModal();
      await loadSocios();
    } catch(e) {
      showToast('Error: ' + e.message, 'error');
    }
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // Cerrar modal al click fuera
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });
</script>
</body>
</html>
